<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正念 - 修心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f8f5f2;
            color: #5a4a42;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
        }
        
        /* Header */
        .header {
            background: #ffffff;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .header h1 {
            font-size: 22px;
            color: #5a4a42;
        }
        
        .category-select {
            padding: 8px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            color: #5a4a42;
            font-size: 14px;
            min-width: 120px;
        }
        
        /* Stats */
        .stats-bar {
            background: #ffffff;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 22px;
            font-weight: bold;
            color: #8b7355;
        }
        
        .stat-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Publish Form */
        .publish-form {
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .publish-form h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #5a4a42;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #8b7355;
            box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.1);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #8b7355 0%, #6d5a43 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(139, 115, 85, 0.3);
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #6d5a43 0%, #5a4a3a 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(139, 115, 85, 0.4);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        /* Blessing Cards */
        .blessing-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .blessing-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        
        .category-tag {
            display: inline-block;
            background: linear-gradient(135deg, #f0ebe5 0%, #e8e0d5 100%);
            color: #8b7355;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 12px;
        }
        
        .blessing-text {
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 10px;
            color: #2c2c2c;
            font-weight: 400;
        }
        
        .blessing-source {
            font-size: 14px;
            color: #888;
            margin-bottom: 15px;
            font-style: italic;
        }
        
        .blessing-practice {
            background: linear-gradient(135deg, #f8f5f2 0%, #f0ebe5 100%);
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            border-left: 3px solid #8b7355;
        }
        
        .blessing-practice strong {
            color: #8b7355;
        }
        
        /* Actions */
        .actions {
            display: flex;
            gap: 10px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
            flex-wrap: wrap;
        }
        
        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f8f5f2;
            border: none;
            cursor: pointer;
            color: #666;
            font-size: 13px;
            padding: 8px 14px;
            border-radius: 8px;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .action-btn:hover {
            background: #f0ebe5;
            color: #8b7355;
        }
        
        .action-btn.active {
            color: #e74c3c;
            background: #fef0ed;
        }
        
        .action-btn.favorite.active {
            color: #f39c12;
            background: #fef5e7;
        }
        
        /* Comments Section */
        .comments-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
        }
        
        .comments-toggle {
            color: #888;
            cursor: pointer;
            font-size: 13px;
            margin-bottom: 10px;
            transition: color 0.2s;
        }
        
        .comments-toggle:hover {
            color: #8b7355;
        }
        
        .comments-list {
            display: none;
        }
        
        .comments-list.show {
            display: block;
        }
        
        .comment {
            background: #f8f5f2;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .comment-author {
            font-size: 13px;
            color: #8b7355;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .comment-content {
            font-size: 14px;
            color: #555;
        }
        
        .comment-form {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }
        
        .comment-form input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .comment-form button {
            padding: 8px 16px;
            background: #8b7355;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 14px;
        }
        
        /* Mobile Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
            
            .header {
                padding: 12px 15px;
                flex-direction: column;
                align-items: flex-start;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .category-select {
                width: 100%;
            }
            
            .stats-bar {
                gap: 20px;
                padding: 10px 15px;
            }
            
            .stat-value {
                font-size: 20px;
            }
            
            .stat-label {
                font-size: 10px;
            }
            
            .publish-form {
                padding: 15px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            
            .blessing-card {
                padding: 15px;
            }
            
            .blessing-text {
                font-size: 16px;
            }
            
            .actions {
                gap: 8px;
            }
            
            .action-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        
        .empty-state-text {
            font-size: 16px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🧘 正念</h1>
            <select class="category-select" id="categoryFilter">
                <option value="全部">全部</option>
                <option value="禅宗">禅宗</option>
                <option value="儒家">儒家</option>
                <option value="道家">道家</option>
                <option value="佛经">佛经</option>
            </select>
        </div>
        
        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalBlessings">-</div>
                <div class="stat-label">禅语总数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalComments">-</div>
                <div class="stat-label">评论总数</div>
            </div>
        </div>
        
        <!-- Publish Button -->
        <div class="publish-form" style="text-align: center; padding: 30px 20px;">
            <button class="btn btn-primary" onclick="goToPublish()" style="padding: 14px 40px; font-size: 16px;">
                ✍️ 分享你的感悟
            </button>
        </div>
        
        <!-- Blessings List -->
        <div id="blessingsList">
            <div class="loading">加载中...</div>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api/blessings';
        let currentUserId = 'user_' + Math.random().toString(36).substr(2, 9);
        let blessingsCache = [];
        
        // Load blessings on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadBlessings();
            loadStats();
            
            // Category filter
            document.getElementById('categoryFilter').addEventListener('change', (e) => {
                loadBlessings(e.target.value);
            });
        });
        
        // Load statistics
        async function loadStats() {
            try {
                const res = await fetch(`${API_BASE}/stats`);
                const data = await res.json();
                if (data.success) {
                    document.getElementById('totalBlessings').textContent = data.data.total_blessings || 0;
                    document.getElementById('totalComments').textContent = data.data.total_comments || 0;
                }
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        }
        
        // Load blessings
        async function loadBlessings(category = '全部') {
            try {
                const url = category === '全部' 
                    ? `${API_BASE}?limit=20`
                    : `${API_BASE}?limit=20&category=${encodeURIComponent(category)}`;
                
                const res = await fetch(url);
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }
                const data = await res.json();
                
                if (data.success) {
                    blessingsCache = data.data || [];
                    renderBlessings(blessingsCache);
                } else {
                    throw new Error(data.error || 'Unknown error');
                }
            } catch (e) {
                console.error('Failed to load blessings:', e);
                document.getElementById('blessingsList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <div class="empty-state-text">加载失败，请刷新重试</div>
                    </div>
                `;
            }
        }
        
        // Render blessings
        function renderBlessings(blessings) {
            const container = document.getElementById('blessingsList');
            
            if (!blessings || blessings.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🍃</div>
                        <div class="empty-state-text">暂无禅语，成为第一个分享的人吧</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = blessings.map(b => `
                <div class="blessing-card" data-id="${b.id}">
                    <span class="category-tag">${b.category}</span>
                    <div class="blessing-text">${escapeHtml(b.text)}</div>
                    <div class="blessing-source">—— ${escapeHtml(b.source || '佚名')}</div>
                    ${b.practice ? `<div class="blessing-practice"><strong>💡 今日练习：</strong>${escapeHtml(b.practice)}</div>` : ''}
                    
                    <div class="actions">
                        <button class="action-btn like-btn ${b.is_liked ? 'active' : ''}" onclick="toggleLike(${b.id})">
                            ❤️ <span>${formatCount(b.like_count)}</span>
                        </button>
                        <button class="action-btn favorite-btn ${b.is_favorited ? 'active' : ''}" onclick="toggleFavorite(${b.id})">
                            ⭐ <span>${formatCount(b.favorite_count)}</span>
                        </button>
                        <button class="action-btn" onclick="toggleComments(${b.id})">
                            💬 评论
                        </button>
                    </div>
                    
                    <div class="comments-section">
                        <div class="comments-toggle" onclick="toggleComments(${b.id})">
                            点击查看评论
                        </div>
                        <div class="comments-list" id="comments-${b.id}">
                            <div class="loading">加载中...</div>
                        </div>
                        <div class="comment-form">
                            <input type="text" id="comment-input-${b.id}" placeholder="写下你的评论...">
                            <button onclick="addComment(${b.id})">发送</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // Go to publish page
        function goToPublish() {
            window.location.href = '/blessings/publish.html';
        }
        
        // Toggle like
        async function toggleLike(blessingId) {
            try {
                const res = await fetch(`${API_BASE}/${blessingId}/like`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUserId })
                });
                
                const data = await res.json();
                if (data.success) {
                    loadBlessings(document.getElementById('categoryFilter').value);
                }
            } catch (e) {
                console.error('Failed to toggle like:', e);
            }
        }
        
        // Toggle favorite
        async function toggleFavorite(blessingId) {
            try {
                const res = await fetch(`${API_BASE}/${blessingId}/favorite`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUserId })
                });
                
                const data = await res.json();
                if (data.success) {
                    loadBlessings(document.getElementById('categoryFilter').value);
                }
            } catch (e) {
                console.error('Failed to toggle favorite:', e);
            }
        }
        
        // Toggle comments
        async function toggleComments(blessingId) {
            const commentsList = document.getElementById(`comments-${blessingId}`);
            const isHidden = commentsList.style.display === 'none' || !commentsList.style.display;
            
            if (isHidden) {
                commentsList.style.display = 'block';
                commentsList.classList.add('show');
                
                // Load comments if not loaded
                if (!commentsList.dataset.loaded) {
                    await loadComments(blessingId);
                    commentsList.dataset.loaded = 'true';
                }
            } else {
                commentsList.style.display = 'none';
                commentsList.classList.remove('show');
            }
        }
        
        // Load comments
        async function loadComments(blessingId) {
            try {
                const res = await fetch(`${API_BASE}/${blessingId}/comments`);
                const data = await res.json();
                
                const container = document.getElementById(`comments-${blessingId}`);
                if (data.success && data.data.length > 0) {
                    container.innerHTML = data.data.map(c => `
                        <div class="comment">
                            <div class="comment-author">${escapeHtml(c.user_name)}</div>
                            <div class="comment-content">${escapeHtml(c.content)}</div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="loading">暂无评论</div>';
                }
            } catch (e) {
                console.error('Failed to load comments:', e);
            }
        }
        
        // Add comment
        async function addComment(blessingId) {
            const input = document.getElementById(`comment-input-${blessingId}`);
            const content = input.value.trim();
            
            if (!content) return;
            
            try {
                const res = await fetch(`${API_BASE}/${blessingId}/comments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: currentUserId,
                        user_name: '匿名',
                        content: content
                    })
                });
                
                const data = await res.json();
                if (data.success) {
                    input.value = '';
                    delete document.getElementById(`comments-${blessingId}`).dataset.loaded;
                    loadComments(blessingId);
                }
            } catch (e) {
                console.error('Failed to add comment:', e);
            }
        }
        
        // Utility functions
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatCount(count) {
            if (count >= 1000) {
                return (count / 1000).toFixed(1) + 'k';
            }
            return count.toString();
        }
    </script>
</body>
</html>
