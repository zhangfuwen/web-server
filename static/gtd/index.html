<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ GTD Desktop - Modern Task Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/gtd.css">
    <link rel="stylesheet" href="css/kanban.css">
</head>
<body>
    <!-- Mobile Header -->
    <div class="mobile-header">
        <button class="menu-toggle" onclick="toggleSidebar()">
            <i class="fas fa-bars"></i>
        </button>
        <span class="mobile-title">GTD Desktop</span>
    </div>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Desktop Sidebar Toggle -->
    <button class="desktop-sidebar-toggle" onclick="toggleDesktopSidebar()" title="Toggle Sidebar">
        <i class="fas fa-bars"></i>
    </button>

    <div class="app-container sidebar-hidden">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <span class="logo-text">GTD Desktop</span>
            </div>

            <nav class="nav-section">
                <div class="nav-label">Views</div>
                <a href="#" class="nav-item active">
                    <i class="fas fa-columns"></i>
                    <span>Board</span>
                </a>
            </nav>

            <nav class="nav-section">
                <div class="nav-label">Filters</div>
                <a href="#" class="nav-item">
                    <i class="fas fa-star"></i>
                    <span>Important</span>
                    <span class="nav-badge" id="important-count">0</span>
                </a>
            </nav>

            <div class="stats-card">
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="total-tasks">0</div>
                        <div class="stat-label">Total</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="completed-tasks">0</div>
                        <div class="stat-label">Done</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header">
                <div>
                    <h1 class="header-title">My Tasks</h1>
                    <p class="header-subtitle">Manage your tasks with GTD methodology</p>
                </div>
                <button class="btn btn-primary" onclick="openQuickAdd()">
                    <i class="fas fa-plus"></i>
                    Add Task
                </button>
            </div>

            <!-- Quick Add -->
            <div class="quick-add" id="quick-add" style="display: none;">
                <div class="quick-add-input">
                    <input type="text" id="new-task-input" placeholder="What needs to be done?" onkeypress="handleKeyPress(event)">
                    <button class="btn btn-primary" onclick="addTaskFromInput()">
                        <i class="fas fa-plus"></i>
                        Add
                    </button>
                    <button class="btn btn-secondary" onclick="closeQuickAdd()">
                        Cancel
                    </button>
                </div>
            </div>

            <!-- Sorting Controls -->
            <div class="sort-controls">
                <span class="sort-label">Sort by:</span>
                <button class="sort-btn active" data-sort="none" onclick="sortTasks('none')">
                    <i class="fas fa-ban"></i>
                    Default
                </button>
                <button class="sort-btn" data-sort="priority" onclick="sortTasks('priority')">
                    <i class="fas fa-flag"></i>
                    Priority
                </button>
                <button class="sort-btn" data-sort="priority-desc" onclick="sortTasks('priority-desc')">
                    <i class="fas fa-flag"></i>
                    Priority (High→Low)
                </button>
                <button class="sort-btn" data-sort="due-date" onclick="sortTasks('due-date')">
                    <i class="fas fa-calendar"></i>
                    Due Date
                </button>
                <button class="sort-btn" data-sort="due-date-desc" onclick="sortTasks('due-date-desc')">
                    <i class="fas fa-calendar"></i>
                    Due Date (Near→Far)
                </button>
            </div>

            <!-- Task Board -->
            <div class="task-board" id="task-board">
                <!-- Columns will be populated by JavaScript -->
            </div>
        </main>
    </div>

    <!-- Task Edit Modal -->
    <div class="modal-overlay" id="task-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Edit Task</h3>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-task-id">
                <input type="hidden" id="edit-task-category">
                
                <div class="form-group">
                    <label class="form-label">Task</label>
                    <input type="text" class="form-input" id="edit-task-title" placeholder="Task description">
                </div>

                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select class="form-select" id="edit-task-status">
                        <option value="todo">To Do</option>
                        <option value="doing">In Progress</option>
                        <option value="done">Done</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select class="form-select" id="edit-task-priority">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Due Date</label>
                    <input type="date" class="form-input" id="edit-task-due-date">
                </div>

                <div class="form-group">
                    <label class="form-label">Comments</label>
                    <textarea class="form-textarea" id="edit-task-comments" placeholder="Add comments (one per line)"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveTaskFromModal()">
                    <i class="fas fa-save"></i>
                    Save
                </button>
            </div>
        </div>
    </div>

    <!-- JavaScript Files -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
